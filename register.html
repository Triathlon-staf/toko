<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Aurevion Cloud</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config (Aurevion Theme) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',    // Slate 900
                            card: '#1e293b',    // Slate 800
                            blue: '#3b82f6',    // Blue 500
                            purple: '#8b5cf6',  // Violet 500
                            accent: '#06b6d4',  // Cyan 500
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Fade Animation */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-brand-dark text-slate-100 antialiased overflow-hidden relative h-screen flex items-center justify-center">

    <!-- BACKGROUND EFFECTS -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-brand-blue/20 rounded-full mix-blend-screen filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 right-1/4 w-96 h-96 bg-brand-purple/20 rounded-full mix-blend-screen filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-32 left-1/3 w-96 h-96 bg-brand-accent/20 rounded-full mix-blend-screen filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <!-- AUTH CARD -->
    <main class="relative z-10 w-full max-w-md p-4">
        <div class="bg-brand-card/80 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl overflow-hidden fade-in">
            
            <!-- Header Logo -->
            <div class="pt-8 pb-4 text-center">
                <a href="index.html" class="inline-flex items-center justify-center mb-4 group">
                    <img src="https://i.pinimg.com/1200x/fd/c3/bc/fdc3bc815b6e16a0942ad7d17edbfcf3.jpg" alt="Logo" class="h-12 w-auto object-contain rounded-lg shadow-lg transition-transform duration-300 group-hover:scale-110 bg-white/5 p-1">
                </a>
                <h1 class="text-3xl font-display font-bold text-white">Aurevion<span class="text-brand-blue">Cloud</span></h1>
                <p class="text-slate-400 text-sm mt-1">Buat akun baru untuk memulai</p>
            </div>

            <!-- Alert Message Container -->
            <div id="authAlert" class="hidden mx-6 mt-4 p-3 rounded-lg text-sm flex items-center gap-2"></div>

            <!-- REGISTER FORM -->
            <div class="p-6 space-y-4 fade-in">
                <form onsubmit="handleRegister(event)">
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 ml-1">Nama Lengkap</label>
                        <div class="relative">
                            <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                            <input type="text" id="regName" required class="w-full bg-brand-dark/50 border border-white/10 rounded-lg py-2.5 pl-10 pr-4 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all" placeholder="John Doe">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 ml-1">Email Address</label>
                        <div class="relative">
                            <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                            <input type="email" id="regEmail" required class="w-full bg-brand-dark/50 border border-white/10 rounded-lg py-2.5 pl-10 pr-4 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all" placeholder="nama@email.com">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 ml-1">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                            <input type="password" id="regPassword" required class="w-full bg-brand-dark/50 border border-white/10 rounded-lg py-2.5 pl-10 pr-10 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all" placeholder="Minimal 6 karakter">
                            <button type="button" onclick="togglePassword('regPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 ml-1">Konfirmasi Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                            <input type="password" id="regConfirmPassword" required class="w-full bg-brand-dark/50 border border-white/10 rounded-lg py-2.5 pl-10 pr-4 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all" placeholder="Ulangi password">
                        </div>
                    </div>

                    <button type="submit" id="btnRegister" class="w-full bg-gradient-to-r from-brand-blue to-brand-purple hover:from-brand-blue/90 hover:to-brand-purple/90 text-white font-medium rounded-lg py-2.5 text-sm shadow-lg shadow-brand-purple/20 transition-all hover:shadow-brand-purple/40 flex items-center justify-center gap-2 mt-4">
                        <span>Daftar Sekarang</span>
                        <i class="fa-solid fa-user-plus"></i>
                    </button>
                </form>
            </div>

            <!-- Footer Text -->
            <div class="px-6 py-4 bg-black/20 text-center">
                <p class="text-xs text-slate-500">
                    Sudah punya akun? 
                    <a href="login.html" class="text-brand-blue hover:underline font-medium">Login disini</a>
                </p>
            </div>
        </div>
        
        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-sm text-slate-500 hover:text-white transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Kembali ke Beranda
            </a>
        </div>
    </main>

    <!-- FIREBASE AUTH SCRIPT -->
    <script type="module">
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        // Konfigurasi Firebase (SAMA DENGAN FILE LAIN)
        const firebaseConfig = {
            apiKey: "AIzaSyDTPN4MXqk4L_zOxO1hK3bftHeehTLwB0g",
            authDomain: "login-dae4f.firebaseapp.com",
            projectId: "login-dae4f",
            storageBucket: "login-dae4f.firebasestorage.app",
            messagingSenderId: "158868098123",
            appId: "1:158868098123:web:b58bb900fdc20c2253d1ce",
            measurementId: "G-SB9KRM9P9K"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // FUNGSI REGISTER
        window.handleRegister = async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const btn = document.getElementById('btnRegister');

            // Validasi Password
            if (password !== confirmPassword) {
                showAlert("Konfirmasi password tidak cocok!", 'error');
                return;
            }

            if (password.length < 6) {
                showAlert("Password minimal 6 karakter.", 'error');
                return;
            }

            // Set Loading State
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Mendaftar...';
            btn.disabled = true;
            hideAlert();

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // Update Profile Name (Agar nama muncul di index.html nanti)
                await updateProfile(userCredential.user, {
                    displayName: name
                });

                console.log("Register berhasil:", userCredential.user);
                
                // Redirect ke Index.html setelah sukses
                window.location.href = "index.html";

            } catch (error) {
                const errorCode = error.code;
                const errorMessage = error.message;
                console.error(errorCode, errorMessage);

                let userMessage = "Terjadi kesalahan saat pendaftaran.";
                if (errorCode === 'auth/email-already-in-use') {
                    userMessage = "Email sudah terdaftar. Silakan <a href='login.html' class='underline font-bold'>Login</a>.";
                } else if (errorCode === 'auth/invalid-email') {
                    userMessage = "Format email tidak valid.";
                } else if (errorCode === 'auth/weak-password') {
                    userMessage = "Password terlalu lemah.";
                }

                showAlert(userMessage, 'error');

                // Reset Button
                btn.innerHTML = '<span>Daftar Sekarang</span> <i class="fa-solid fa-user-plus"></i>';
                btn.disabled = false;
            }
        };

        // HELPER FUNCTIONS
        function showAlert(message, type) {
            const alertBox = document.getElementById('authAlert');
            alertBox.innerHTML = message; // Gunakan innerHTML untuk memungkinkan tag HTML (link login)
            alertBox.classList.remove('hidden', 'bg-red-500/10', 'text-red-400', 'border-red-500/20', 'bg-green-500/10', 'text-green-400', 'border-green-500/20');
            
            if (type === 'error') {
                alertBox.classList.add('bg-red-500/10', 'text-red-400', 'border', 'border-red-500/20');
            } else {
                alertBox.classList.add('bg-green-500/10', 'text-green-400', 'border', 'border-green-500/20');
            }
            alertBox.classList.remove('hidden');
        }

        function hideAlert() {
            document.getElementById('authAlert').classList.add('hidden');
        }
    </script>

    <!-- UI LOGIC SCRIPT (Password Toggle) -->
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
