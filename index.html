        GANTI SELURUH SCRIPT INI DI BAGIAN PALING BAWAH index.html 
        (Tepat di atas tag </body>, sebelum script FAQ)
    -->
    <script type="module">
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        // Konfigurasi Firebase (SAMA DENGAN FILE LOGIN)
        const firebaseConfig = {
            apiKey: "AIzaSyDTPN4MXqk4L_zOxO1hK3bftHeehTLwB0g",
            authDomain: "login-dae4f.firebaseapp.com",
            projectId: "login-dae4f",
            storageBucket: "login-dae4f.firebasestorage.app",
            messagingSenderId: "158868098123",
            appId: "1:158868098123:web:b58bb900fdc20c2253d1ce",
            measurementId: "G-SB9KRM9P9K"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const authContainer = document.getElementById('authContainer');
        const navbarSticky = document.getElementById('navbar-sticky');
        const navbar = document.getElementById('navbar');

        // FUNGSI GLOBAL UNTUK TOGGLE MENU
        window.toggleMenu = () => {
            navbarSticky.classList.toggle('hidden');
        };

        // FUNGSI LOGOUT
        window.handleLogout = () => {
            if(confirm('Apakah Anda yakin ingin keluar?')) {
                signOut(auth).then(() => {
                    // Redirect ke login setelah keluar
                    window.location.href = "login.html"; 
                }).catch((error) => {
                    console.error('Error logout:', error);
                    alert('Gagal keluar, coba lagi.');
                });
            }
        };

        // FUNGSI SCROLL NAVBAR
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                navbar.classList.add('shadow-lg');
                navbar.classList.replace('bg-brand-dark/80', 'bg-brand-dark/95');
            } else {
                navbar.classList.remove('shadow-lg');
                navbar.classList.replace('bg-brand-dark/95', 'bg-brand-dark/80');
            }
        });

        // LOGIKA CEK STATUS LOGIN (W AJIB LOGIN)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // --- USER SUDAH LOGIN ---
                const displayName = user.displayName || user.email.split('@')[0];
                
                // Render HTML untuk User yang Login
                authContainer.innerHTML = `
                    <div class="hidden md:flex items-center gap-3 mr-4">
                        <div class="text-right">
                            <p class="text-xs text-slate-400">Selamat Datang,</p>
                            <p class="text-sm font-bold text-white">${displayName}</p>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-brand-blue to-brand-purple flex items-center justify-center text-white font-bold shadow-lg border border-white/10">
                            ${displayName.charAt(0).toUpperCase()}
                        </div>
                    </div>
                    <button onclick="window.handleLogout()" class="hidden sm:flex text-white bg-slate-700 hover:bg-slate-600 focus:ring-4 focus:ring-slate-700 font-medium rounded-lg text-sm px-4 py-2 transition-all items-center gap-2">
                        <i class="fa-solid fa-right-from-bracket"></i> Keluar
                    </button>
                    <!-- Tombol Mobile Menu -->
                    <button onclick="window.toggleMenu()" class="ml-2 inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-slate-300 rounded-lg md:hidden hover:bg-white/10 focus:outline-none">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                `;
                
            } else {
                // --- USER BELUM LOGIN ---
                // PERUBAHAN PENTING: Langsung Redirect ke Login
                console.log("Akses ditolak. Mengarahkan ke login...");
                window.location.href = "login.html";
            }
        });
    </script>
