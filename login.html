<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Aurevion Cloud</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config (Sama dengan index.html) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',    // Slate 900
                            card: '#1e293b',    // Slate 800
                            blue: '#3b82f6',    // Blue 500
                            purple: '#8b5cf6',  // Violet 500
                            accent: '#06b6d4',  // Cyan 500
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-slate-100 antialiased relative min-h-screen flex items-center justify-center overflow-hidden">

    <!-- BACKGROUND EFFECTS -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-brand-blue/20 rounded-full mix-blend-screen filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 right-1/4 w-96 h-96 bg-brand-purple/20 rounded-full mix-blend-screen filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-32 left-1/3 w-96 h-96 bg-brand-accent/20 rounded-full mix-blend-screen filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <!-- LOGIN CARD -->
    <div class="relative z-10 w-full max-w-md p-6">
        
        <div class="bg-brand-card/80 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl overflow-hidden">
            
            <!-- Header Card -->
            <div class="p-8 pb-0 text-center">
                <a href="index.html" class="inline-flex items-center justify-center space-x-2 mb-6 group">
                    <div class="w-10 h-10 bg-gradient-to-br from-brand-blue to-brand-purple rounded-lg flex items-center justify-center shadow-lg shadow-brand-purple/20 group-hover:scale-105 transition-transform">
                        <i class="fa-solid fa-cloud-bolt text-white text-xl"></i>
                    </div>
                    <span class="self-center text-2xl font-display font-bold text-white">Aurevion<span class="text-brand-blue">Cloud</span></span>
                </a>
                
                <h2 class="text-2xl font-bold text-white mb-2">Selamat Datang Kembali</h2>
                <p class="text-slate-400 text-sm">Masuk untuk mengelola server Anda.</p>
            </div>

            <!-- Form -->
            <div class="p-8">
                <form id="loginForm" class="space-y-4">
                    
                    <!-- Email Input -->
                    <div>
                        <label for="email" class="block mb-2 text-sm font-medium text-slate-300">Email</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-500">
                                <i class="fa-solid fa-envelope"></i>
                            </div>
                            <input type="email" id="email" class="bg-brand-dark/50 border border-white/10 text-white text-sm rounded-lg focus:ring-brand-blue focus:border-brand-blue block w-full pl-10 p-2.5 placeholder-slate-500 transition-colors" placeholder="nama@email.com" required>
                        </div>
                    </div>
                    
                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block mb-2 text-sm font-medium text-slate-300">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-500">
                                <i class="fa-solid fa-lock"></i>
                            </div>
                            <input type="password" id="password" class="bg-brand-dark/50 border border-white/10 text-white text-sm rounded-lg focus:ring-brand-blue focus:border-brand-blue block w-full pl-10 p-2.5 placeholder-slate-500 transition-colors" placeholder="••••••••" required>
                        </div>
                    </div>

                    <!-- Error Message Container -->
                    <div id="error-message" class="hidden p-3 text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg"></div>

                    <!-- Login Button -->
                    <button type="submit" id="loginBtn" class="w-full text-white bg-gradient-to-r from-brand-blue to-brand-purple hover:from-brand-blue/90 hover:to-brand-purple/90 focus:ring-4 focus:ring-brand-purple/30 font-medium rounded-lg text-sm px-5 py-3 text-center transition-all shadow-lg shadow-brand-purple/20 flex items-center justify-center gap-2">
                        <span>Masuk Sekarang</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <div class="flex items-center my-6">
                    <div class="w-full border-t border-white/10"></div>
                    <span class="px-3 text-xs text-slate-500 uppercase font-semibold">Atau</span>
                    <div class="w-full border-t border-white/10"></div>
                </div>

                <!-- Google Login Button -->
                <button id="googleBtn" class="w-full text-white bg-white/5 hover:bg-white/10 border border-white/10 focus:ring-4 focus:ring-slate-700 font-medium rounded-lg text-sm px-5 py-3 text-center transition-all flex items-center justify-center gap-3">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                    <span>Masuk dengan Google</span>
                </button>

                <!-- Footer Link -->
                <p class="text-sm font-light text-slate-400 text-center mt-6">
                    Belum punya akun? <a href="#" class="font-medium text-brand-blue hover:underline">Daftar disini</a>
                </p>
            </div>
        </div>
    </div>

    <!-- FIREBASE AUTH SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDTPN4MXqk4L_zOxO1hK3bftHeehTLwB0g",
            authDomain: "login-dae4f.firebaseapp.com",
            projectId: "login-dae4f",
            storageBucket: "login-dae4f.firebasestorage.app",
            messagingSenderId: "158868098123",
            appId: "1:158868098123:web:b58bb900fdc20c2253d1ce",
            measurementId: "G-SB9KRM9P9K"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // --- LOGIKA REDIRECT (PENTING) ---
        // Membaca URL untuk melihat user mau kemana setelah login
        const urlParams = new URLSearchParams(window.location.search);
        // Jika ada parameter redirect, gunakan itu. Jika tidak, kembalikan ke index.html
        const redirectTarget = urlParams.get('redirect') || 'index.html';

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const googleBtn = document.getElementById('googleBtn');
        const errorMsg = document.getElementById('error-message');

        // Fungsi Helper untuk Redirect
        const handleSuccess = () => {
            window.location.href = redirectTarget;
        };

        // Fungsi Helper untuk Error
        const handleError = (message) => {
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
            // Reset tombol
            loginBtn.disabled = false;
            loginBtn.innerHTML = `<span>Masuk Sekarang</span> <i class="fa-solid fa-arrow-right"></i>`;
            googleBtn.disabled = false;
        };

        // 1. Login dengan Email & Password
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // UI Loading State
            loginBtn.disabled = true;
            loginBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Memproses...`;
            errorMsg.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                handleSuccess(); // Redirect otomatis
            } catch (error) {
                const errorCode = error.code;
                if (errorCode === 'auth/wrong-password') {
                    handleError("Password salah.");
                } else if (errorCode === 'auth/user-not-found') {
                    handleError("Email tidak ditemukan.");
                } else {
                    handleError("Login gagal: " + error.message);
                }
            }
        });

        // 2. Login dengan Google
        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            googleBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Menghubungkan...`;
            errorMsg.classList.add('hidden');

            try {
                await signInWithPopup(auth, provider);
                handleSuccess(); // Redirect otomatis
            } catch (error) {
                handleError("Gagal login dengan Google.");
                googleBtn.disabled = false;
                googleBtn.innerHTML = `<img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google"> <span>Masuk dengan Google</span>`;
            }
        });

        // 3. Cek Status Saat Halaman Dimuat
        // Jika user ternyata SUDAH login saat membuka halaman ini, langsung redirect saja.
        onAuthStateChanged(auth, (user) => {
            if (user) {
                handleSuccess();
            }
        });

    </script>
</body>
</html>
